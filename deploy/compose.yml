services:
  web:
    image: ghcr.io/timburga/altheroes-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"   # expose on loopback only; proxy to this port
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Admin__Password: ${ADMIN_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      OTEL_SERVICE_NAME: altheroes-web
      # Uncomment and configure once the bot is running:
      # BotClient__BaseUrl: http://bot:8080
      # BotClient__AdminApiKey: ${ADMIN_API_KEY}
    networks:
      - altheroes

  # ── Bot (uncomment when ready) ───────────────────────────────────────────────
  # bot:
  #   image: ghcr.io/timburga/altheroes-bot:latest
  #   restart: unless-stopped
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Production
  #     Bot__Did: ${BOT_DID}
  #     Bot__Handle: ${BOT_HANDLE}
  #     Bot__AppPassword: ${BOT_APP_PASSWORD}
  #     Labeler__Did: ${LABELER_DID}
  #     Labeler__OzoneUrl: ${LABELER_OZONE_URL}
  #     Jetstream__Url: ${JETSTREAM_URL:-wss://jetstream2.us-east.bsky.network/subscribe}
  #     Admin__ApiKey: ${ADMIN_API_KEY}
  #     OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
  #     OTEL_SERVICE_NAME: altheroes-bot
  #   volumes:
  #     - bot-data:/app/data
  #   networks:
  #     - altheroes

  # ── Telemetry (single container: Prometheus + Loki + Tempo + Grafana) ────────
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI — SSH tunnel or reverse proxy to access
    volumes:
      - otel-lgtm-data:/data
    networks:
      - altheroes

networks:
  altheroes:

volumes:
  otel-lgtm-data:
# bot-data:   # uncomment with bot
