name: Mirror from Azure DevOps

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Azure repo to GitHub
        run: |
          git clone --mirror \
            "https://${{ secrets.AZURE_PAT }}@dev.azure.com/${{ secrets.AZURE_ORG }}/${{ secrets.AZURE_PROJECT }}/_git/${{ secrets.AZURE_REPO }}" \
            repo
          cd repo
          git push --mirror \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
